<!DOCTYPE html>
<html lang="pt-br">
<head>

<title>Sistema de Rifa</title>

</head>
<body>

<div class="container">

<h1>Rifa Online</h1>

<div id="grid"></div>

</div>

<div class="modal-content">

<button onclick="fecharModal()">Cancelar</button>

</div>

</div>
