<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Rifa</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>🤑Controle Rifa🎰</h1>

<div id="grid"></div>

</div>

<div id="modal" class="modal">

  <div class="modal-content">

    <h2>Registrar venda</h2>

    <p class="numero-info">
      Número: <strong id="numeroSelecionado"></strong>
    </p>

    <label>Nome do comprador</label>
    <input type="text" id="nome" placeholder="Digite o nome">

    <label>Telefone</label>
    <input type="tel" id="telefone" placeholder="(00) 00000-0000">

    <div class="botoes">

      <button class="confirmar" onclick="registrarVenda()">
        Confirmar venda
      </button>

      <button class="cancelar" onclick="fecharModal()">
        Cancelar
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
